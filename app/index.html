<html lang="en">
  <head>
    <title>Decryption Simulator</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <link rel="stylesheet" type="text/css" href="./style/main.css" />
    <link rel="shortcut icon" type="image/x-icon" href="./icon/favicon.ico" />
    <style></style>
    <script>
      (function (d) {
        var config = {
            kitId: "ywh2zpw",
            scriptTimeout: 3000,
            async: true,
          },
          h = d.documentElement,
          t = setTimeout(function () {
            h.className =
              h.className.replace(/\bwf-loading\b/g, "") + " wf-inactive";
          }, config.scriptTimeout),
          tk = d.createElement("script"),
          f = false,
          s = d.getElementsByTagName("script")[0],
          a;
        h.className += " wf-loading";
        tk.src = "https://use.typekit.net/" + config.kitId + ".js";
        tk.async = true;
        tk.onload = tk.onreadystatechange = function () {
          a = this.readyState;
          if (f || (a && a != "complete" && a != "loaded")) return;
          f = true;
          clearTimeout(t);
          try {
            Typekit.load(config);
          } catch (e) {}
        };
        s.parentNode.insertBefore(tk, s);
      })(document);
    </script>
  </head>
  <body>
    <section id="start-screen" class="full-screen">
      <h1>Use audio for best experience.</h1>
      <p>
        <button id="start-screen-start">Start</button>
      </p>
    </section>

    <section id="menu" class="full-screen">
      <div class="row header">
        <h2>Decryption Menu</h2>
        <div id="stage-counter">
          Total Stages Cleared: <span id="stages-cleared">0</span>
        </div>
      </div>
      <div class="row content">
        <p>
          <button id="menu-continue">Start</button>
        </p>
        <p>
          <button id="menu-restart" style="display: none">Restart</button>
        </p>
      </div>
      <ul class="row footer">
        <li>You can only take 3 hits.</li>
        <li>Do not crash into the enemies.</li>
        <li>Clear as many stages as you can.</li>
      </ul>
    </section>

    <section id="hacking-complete" class="hidden full-screen info">
      <h3>DECRYPTED</h3>
    </section>

    <section id="game-complete" class="hidden full-screen info">
      <h3>GAME COMPLETE</h3>
      <p>
        <button id="complete-restart">Restart</button>
      </p>
    </section>

    <section id="game-over" class="hidden full-screen info">
      <h3>SYSTEM CRASHED</h3>
      <p>
        <button id="gameover-restart">Restart</button>
      </p>
    </section>

    <script src="build/bundle.js"></script>
  </body>
</html>
